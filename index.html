<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Controle do Aeroporto</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 400px; margin: auto; border: 1px solid #ccc; padding: 20px; border-radius: 10px; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        #avisoSistema { margin-top: 20px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛫 Registrar Voo</h2>
    <input type="text" id="codigo" placeholder="Código do Voo (ex: G3-100)">
    <input type="text" id="origem" placeholder="Cidade de Origem">
    <input type="text" id="destino" placeholder="Cidade de Destino">
    <input type="number" id="capacidade" placeholder="Capacidade de Passageiros">
    <button id="btnRegistrar">Registrar Voo</button>

    <p id="avisoSistema"></p>
</div>

<!-- O segredo: type="module" -->
<script type="module" src="painel.js"></script>
</body>
</html>
