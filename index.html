    <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aeroporto Inteligente - Frota</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Painel de Controle da Frota</h1>

    <div class="container">
        <!-- Card do Jato -->
        <div class="card" id="card-jato">
            <h2>Jato Executivo 💎</h2>
            <p id="info-jato">Aguardando dados...</p>
            <div class="controles">
                <button onclick="controlarJato('decolar')">Decolar</button>
                <button onclick="controlarJato('pousar')">Pousar</button>
                <button onclick="controlarJato('ativar')">Ativar Supersônico</button>
                <button onclick="controlarJato('desativar')">Desativar Supersônico</button>
                <button onclick="controlarJato('radio')">Rádio</button>
            </div>
        </div>

        <!-- Card do Cargueiro -->
        <div class="card" id="card-carga">
            <h2>Voo de Carga 📦</h2>
            <p id="info-carga">Aguardando dados...</p>
            <div class="controles">
                <button onclick="controlarCarga('decolar')">Decolar</button>
                <button onclick="controlarCarga('pousar')">Pousar</button>
                <input type="number" id="input-carga" placeholder="Ton.">
                <button onclick="controlarCarga('embarcar')">Embarcar Carga</button>
                <button onclick="controlarCarga('radio')">Rádio</button>
            </div>
        </div>
    </div>

    <div id="console-log">Log do Sistema: Aguardando comandos...</div>

    <script src="script.js"></script>
    <script src="interacao.js"></script>
</body>
</html>
